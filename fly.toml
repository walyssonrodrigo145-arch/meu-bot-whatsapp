# fly.toml app configuration file generated for meu-bot-whatsapp on 2026-05-16T19:54:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'meu-bot-whatsapp'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'baileys_auth'
  destination = '/app/baileys_auth_info'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
